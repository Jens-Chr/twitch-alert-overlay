<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twitch Alert Overlay</title>
    <link rel="stylesheet" href="/overlay/alerts/assets/overlay.css">
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <video id="alert-video" class="alert-video" playsinline preload="auto"></video>
      <div id="alert-message" class="alert-message" aria-hidden="true">
        <span id="alert-message-text" class="alert-message-text"></span>
      </div>
    </main>
    <script src="/overlay/alerts/assets/overlay.js"></script>
  </body>
</html>
